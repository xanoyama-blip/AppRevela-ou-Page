<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Revela ou Paga - O Jogo</title>
    <style>
        :root {
            --primary-neon: #00f2fe;
            --secondary-neon: #ff0055;
            --gold-neon: #ffbd39;
            --bg-dark: #0a001a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Poppins', 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- ANIMAÇÕES DE FUNDO --- */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: var(--bg-dark);
            overflow: hidden;
        }

        .nebula {
            position: absolute; width: 500px; height: 500px;
            border-radius: 50%; filter: blur(80px); opacity: 0.15;
            animation: moveNebula 20s infinite alternate ease-in-out;
        }

        @keyframes moveNebula {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        .stars-overlay {
            position: absolute; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.3;
        }

        .shooting-star {
            position: absolute; width: 2px; height: 2px; background: white;
            box-shadow: 0 0 10px white, 0 0 20px var(--primary-neon);
            opacity: 0; animation: shoot 8s infinite linear;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateX(-500px) translateY(500px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        .creator-tag {
            font-size: 10px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px;
            text-transform: uppercase; margin-top: -5px; margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }

        @keyframes cardBounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .card-change-anim { animation: cardBounce 0.4s ease-out; }

        .roulette-icon {
            position: absolute; top: 20px; right: 20px; font-size: 32px;
            cursor: pointer; z-index: 100; filter: drop-shadow(0 0 8px var(--gold-neon));
            transition: transform 0.3s;
        }
        .roulette-icon:active { transform: scale(0.9) rotate(-20deg); }

        #roulette-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 25, 0.98); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .close-roulette {
            position: absolute; top: 25px; right: 25px; font-size: 35px;
            color: var(--secondary-neon); font-weight: bold; cursor: pointer;
        }

        .roulette-container {
            width: 260px; height: 260px; border-radius: 50%;
            border: 6px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center;
            background: conic-gradient(from 0deg, #111, #222, #111, #333, #111);
            box-shadow: 0 0 40px rgba(255, 189, 57, 0.3);
            transition: transform 5s cubic-bezier(0.15, 0, 0, 1);
        }

        .result-name { margin-top: 25px; font-size: 28px; font-weight: 800; text-shadow: 0 0 15px var(--primary-neon); min-height: 40px; }
        .win-anim { animation: winPulse 0.5s infinite alternate; }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        header { padding: 25px 20px 5px; text-align: center; }
        header h1 { 
            margin:0; font-size: 28px; font-weight: 900; 
            text-shadow: 0 0 15px var(--primary-neon); 
            letter-spacing: 1px;
            animation: glowText 3s infinite alternate;
        }

        @keyframes glowText {
            from { text-shadow: 0 0 5px var(--primary-neon); }
            to { text-shadow: 0 0 20px var(--primary-neon), 0 0 30px var(--primary-neon); }
        }

        .categories { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .cat-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 10px 15px; border-radius: 12px; font-size: 10px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        .cat-btn.active { 
            background: var(--primary-neon); color: black; 
            border-color: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon);
        }

        .scene { width: 280px; height: 360px; perspective: 1200px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 24px; border: 3px solid var(--gold-neon); box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .card-front { 
            background: linear-gradient(135deg, #1a0033 0%, #0f001f 100%);
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
        .card-front::after { content: "🃏"; font-size: 70px; filter: drop-shadow(0 0 10px var(--gold-neon)); }
        
        .card-back { background: white; color: #111; transform: rotateY(180deg); padding: 25px; text-align: center; }
        
        .type-label { font-weight: 900; text-transform: uppercase; margin-bottom: 12px; font-size: 20px; }
        .content-text { font-size: 16px; line-height: 1.4; font-weight: 600; color: #333; }

        .controls { display: flex; gap: 15px; margin-top: 25px; }
        .btn-action {
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid transparent;
            color: white; font-weight: 800; font-size: 11px; cursor: pointer; 
            background: rgba(0,0,0,0.4); transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.9); }
        .verdade { border-color: var(--primary-neon); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .desafio { border-color: var(--secondary-neon); box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }

        .custom-area { margin-top: auto; padding: 20px; width: 100%; box-sizing: border-box; position: relative; z-index: 5;}
        .input-group { display: flex; gap: 8px; }
        input { 
            flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px; border-radius: 12px; outline: none; 
        }
        .add-btn { background: var(--gold-neon); color: #000; padding: 0 15px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }
        
        .player-tag { display: inline-block; background: rgba(0, 242, 254, 0.1); color: var(--primary-neon); padding: 6px 12px; border-radius: 8px; margin: 4px; font-size: 12px; border: 1px solid rgba(0, 242, 254, 0.3); }
    </style>
</head>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicActive = false;

    function tone(freq, type, dur, vol, slide = 0) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide > 0) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function playGameMusic() {
        if (musicActive) return;
        musicActive = true;
        const notes = [329.63, 392.00, 440.00, 523.25];
        let i = 0;
        setInterval(() => {
            tone(notes[i], 'sine', 1, 0.02);
            if (i % 2 === 0) tone(notes[i] * 2, 'triangle', 0.2, 0.01);
            i = (i + 1) % notes.length;
        }, 600);
    }

    const gameSFX = {
        tap: () => tone(800, 'sine', 0.1, 0.06, 1200),
        card: () => { 
            tone(400, 'triangle', 0.15, 0.1); 
            setTimeout(() => tone(900, 'sine', 0.1, 0.05), 40);
        },
        swipe: () => tone(200, 'sawtooth', 0.2, 0.04, 800),
        roulette: () => {
            let count = 0;
            const timer = setInterval(() => {
                tone(300 + (count * 20), 'square', 0.05, 0.02);
                if (++count > 30) clearInterval(timer);
            }, 100);
        },
        win: () => {
            [523, 659, 783, 1046].forEach((f, i) => {
                setTimeout(() => tone(f, 'sine', 0.5, 0.08), i * 120);
            });
        }
    };

    let players = [];
    let isSpinning = false;
    
    function toggleRoulette() {
        gameSFX.tap();
        const modal = document.getElementById('roulette-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function addPlayer() {
        gameSFX.tap();
        const input = document.getElementById('player-name');
        if (input.value.trim() !== "") {
            players.push(input.value.trim());
            renderPlayers();
            input.value = "";
        }
    }

    function renderPlayers() {
        document.getElementById('player-tags').innerHTML = players.map(p => `<span class="player-tag">${p}</span>`).join('');
    }

    function spinWheel() {
        if (players.length < 2 || isSpinning) return;
        isSpinning = true;
        gameSFX.roulette();
        const wheel = document.getElementById('wheel');
        const display = document.getElementById('winner-display');
        display.innerText = "SORTEANDO...";
        display.classList.remove('win-anim');
        const deg = Math.floor(Math.random() * 360) + 5000; 
        wheel.style.transform = `rotate(${deg}deg)`;
        setTimeout(() => {
            gameSFX.win();
            display.innerText = players[Math.floor(Math.random() * players.length)];
            display.classList.add('win-anim');
            isSpinning = false;
        }, 5000);
    }

                "Lave a louça da próxima refeição.", "Conte uma piada ruim e faça todos rirem.", "Mímica de um animal difícil.", "Imite seu pai ou sua mãe agora.", "Ligue para um parente e diga que o ama do nada.", "Faça um café para quem está jogando.", "Dance uma música antiga da Xuxa.", "Arume uma gaveta da casa agora.", "Fique 2 minutos sem usar o celular.", "Faça uma declaração de amor para um pet da casa.",
                /* +20 Desafios de Família */
                "Organize os sapatos da sala.", "Dê um abraço de 30 segundos em quem está jogando com você.", "Faça uma massagem nos ombros de quem está à sua esquerda.", "Cante o hino nacional com uma voz engraçada.", "Vá até a cozinha e traga um copo de água para o 'rei' da rodada.", "Fique em silêncio absoluto por 3 rodadas.", "Faça 10 agachamentos gritando 'Eu amo minha família'.", "Deixe alguém da família mudar sua foto de perfil do WhatsApp por 10 minutos.", "Mande uma mensagem no grupo da família dizendo que ganhou na loteria.", "Tente equilibrar um livro na cabeça enquanto dá uma volta na sala.", "Imite um bebê chorando por 20 segundos.", "Faça uma careta e deixe alguém tirar uma foto.", "Diga algo que você admira em cada pessoa da roda.", "Ligue para um primo e conte uma fofoca falsa.", "Tente assobiar uma música famosa e alguém tem que adivinhar.", "Use o chinelo trocado até o final do jogo.", "Finja que é um garçom e sirva petiscos para todos.", "Faça uma rima com o nome de cada pessoa presente.", "Limpe a tela do celular de todo mundo que está jogando.", "Tente fazer um castelo de cartas com 5 cartas."
            ]
        }
    };

    function setCategory(cat) {
        if(currentCategory === cat) return;
        gameSFX.swipe();
        currentCategory = cat;
        usedQuestions = [];
        scene.classList.remove('card-change-anim');
        void scene.offsetWidth; 
        scene.classList.add('card-change-anim');
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        document.getElementById('mode-info').innerText = "MODO: " + cat.toUpperCase();
        resetCard();
    }

    function pick(mode) {
        gameSFX.card();
        const list = db[currentCategory][mode === 'verdade' ? 'verdade' : 'desafio'];
        let available = list.filter(q => !usedQuestions.includes(q));
        if (available.length === 0) { usedQuestions = []; available = list; }
        const randomText = available[Math.floor(Math.random() * available.length)];
        usedQuestions.push(randomText);
        
        if(card.classList.contains('is-flipped')) {
            card.classList.remove('is-flipped');
            setTimeout(() => { updateAndFlip(mode, randomText); }, 300);
        } else { updateAndFlip(mode, randomText); }
    }

    function updateAndFlip(mode, text) {
        cardType.innerText = mode === 'verdade' ? 'REVELA' : 'PAGA';
        cardType.style.color = mode === 'verdade' ? '#2196F3' : '#F44336';
        cardText.innerText = text;
        card.classList.add('is-flipped');
    }

    function flipCard() { 
        if(cardText.innerText !== "Escolha um botão abaixo!") {
            gameSFX.card();
            card.classList.toggle('is-flipped'); 
        }
    }
    
    function resetCard() { card.classList.remove('is-flipped'); cardText.innerText = "Escolha um botão abaixo!"; }
    
    function addCustom() {
        gameSFX.tap();
        const input = document.getElementById('custom-text');
        if(input.value.trim() !== "") db[currentCategory].desafio.push(input.value);
        input.value = "";
    }
</script>
</body>
</html>
