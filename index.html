<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Revela ou Paga - O Jogo</title>
    <style>
        :root {
            --primary-neon: #00f2fe;
            --secondary-neon: #ff0055;
            --gold-neon: #ffbd39;
            --bg-dark: #0f001f;
        }

        /* --- TELA DE CARREGAMENTO ULTRA --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0033 0%, #05000a 100%); 
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Animação de Glitch no Título */
        .loader-logo { 
            font-size: 42px; font-weight: 900; color: white; 
            text-shadow: 2px 2px var(--secondary-neon), -2px -2px var(--primary-neon);
            margin-bottom: 30px; letter-spacing: 4px; z-index: 2;
            animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); text-shadow: 4px 4px var(--secondary-neon), -4px -4px var(--primary-neon); }
        }

        .loader-container { width: 250px; text-align: center; z-index: 2; }
        .loader-bar { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.1); 
            border-radius: 20px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .loader-fill { 
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--secondary-neon), var(--primary-neon)); 
            transition: width 2.5s cubic-bezier(0.1, 0.5, 0.5, 1); 
            box-shadow: 0 0 20px var(--primary-neon);
        }

        /* Partículas de fundo no Loading */
        .loading-particle {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.3; animation: floatParticle 5s infinite linear;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .enter-btn { 
            margin-top: 40px; padding: 18px 50px; border-radius: 50px; 
            border: none; background: white; color: black; font-weight: 900; 
            cursor: pointer; display: none; z-index: 2;
            box-shadow: 0 0 30px white; text-transform: uppercase;
            animation: btnSlideUp 0.5s ease-out forwards;
        }

        @keyframes btnSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- RESTO DO APP --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #0f001f; }

        body {
            margin: 0; background: transparent; color: white;
            font-family: 'Poppins', 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .creator-tag { font-size: 10px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; text-transform: uppercase; margin-top: -5px; margin-bottom: 15px; }

        @keyframes cardBounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.08) translateY(-10px); filter: brightness(1.5); }
            100% { transform: scale(1) translateY(0); filter: brightness(1); }
        }
        .card-change-anim { animation: cardBounce 0.5s ease-out; }

        .roulette-icon { position: absolute; top: 20px; right: 20px; font-size: 32px; cursor: pointer; z-index: 100; filter: drop-shadow(0 0 8px var(--gold-neon)); }

        #roulette-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 20, 0.98); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        .close-roulette { position: absolute; top: 25px; right: 25px; font-size: 35px; color: var(--secondary-neon); font-weight: bold; cursor: pointer; }

        .roulette-container {
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid #222; position: relative;
            display: flex; align-items: center; justify-content: center;
            background: conic-gradient(from 0deg, #111, #222, #111, #333, #111);
            box-shadow: inset 0 0 50px #000, 0 0 30px var(--gold-neon);
            transition: transform 5s cubic-bezier(0.15, 0, 0, 1);
        }

        .result-name { margin-top: 25px; font-size: 28px; font-weight: 800; text-shadow: 0 0 15px var(--primary-neon); min-height: 40px; }
        .win-anim { animation: winPulse 0.5s infinite alternate; }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        header { padding: 25px 20px 5px; text-align: center; }
        header h1 { margin:0; font-size: 26px; font-weight: 800; text-shadow: 0 0 10px var(--primary-neon); }

        .categories { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .cat-btn {
            background: #222; border: 1px solid var(--gold-neon); color: white;
            padding: 10px 18px; border-radius: 20px; font-size: 11px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary-neon); color: black; transform: scale(1.05); }

        .scene { width: 300px; height: 380px; perspective: 1200px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; border: 4px solid var(--gold-neon); box-sizing: border-box;
        }

        .card-front { background: #1a0033; }
        .card-front::after { content: "🃏"; font-size: 80px; filter: drop-shadow(0 0 10px var(--gold-neon)); }
        .card-back { background: #fff; color: #111; transform: rotateY(180deg); padding: 25px; text-align: center; }
        
        .type-label { font-weight: 800; text-transform: uppercase; margin-bottom: 15px; font-size: 22px; }
        .content-text { font-size: 17px; line-height: 1.4; font-weight: 600; }

        .controls { display: flex; gap: 20px; margin-top: 25px; }
        .btn-action {
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid transparent;
            color: white; font-weight: 800; font-size: 13px; cursor: pointer; background: rgba(0,0,0,0.3);
        }
        .verdade { border-color: var(--primary-neon); color: var(--primary-neon); }
        .desafio { border-color: var(--secondary-neon); color: var(--secondary-neon); }

        .custom-area { margin-top: auto; padding: 20px; width: 100%; box-sizing: border-box; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .add-btn { background: var(--gold-neon); color: #000; padding: 0 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        
        .player-tag { display: inline-block; background: rgba(0, 242, 254, 0.2); color: var(--primary-neon); padding: 6px 12px; border-radius: 8px; margin: 4px; font-size: 13px; border: 1px solid var(--primary-neon); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="loading-screen">
        <div id="loading-bg-elements"></div>
        <div class="loader-logo">REVELA OU PAGA</div>
        <div class="loader-container">
            <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
        </div>
        <button class="enter-btn" id="enter-btn" onclick="startGame()">JOGAR AGORA</button>
    </div>

    <div class="roulette-icon" onclick="openRouletteWithSound()">🎡</div>

    <div id="roulette-modal">
        <div class="close-roulette" onclick="toggleRoulette()">✖</div>
        <div class="roulette-wrapper">
            <div style="width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid var(--secondary-neon); position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 1001;"></div>
            <div class="roulette-container" id="wheel">
                <div style="width:40px; height:40px; background:var(--gold-neon); border-radius:50%; z-index:1002; border:4px solid #111;"></div>
            </div>
        </div>
        <div class="result-name" id="winner-display"></div>
        <div style="width: 85%; max-width: 320px; text-align: center;">
            <div id="player-tags" style="max-height: 80px; overflow-y: auto; margin-bottom: 10px;"></div>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="Nome do jogador...">
                <button class="add-btn" onclick="addPlayer()">ADD</button>
            </div>
            <button class="add-btn" style="width:100%; margin-top:15px; height:50px; background:var(--primary-neon);" onclick="spinWheel()">GIRAR AGORA!</button>
        </div>
    </div>

    <header>
        <h1>REVELA OU PAGA</h1>
        <div class="creator-tag">Criador: Leonardo Silva</div>
        <small id="mode-info" style="color:var(--primary-neon)">MODO: AMIGOS</small>
    </header>

    <div class="categories">
        <button class="cat-btn active" id="btn-Amigos" onclick="setCategory('Amigos')">Amigos</button>
        <button class="cat-btn" id="btn-Pesado" onclick="setCategory('Pesado')">Pesado 🔥</button>
        <button class="cat-btn" id="btn-Família" onclick="setCategory('Família')">Família</button>
    </div>

    <div class="scene" id="card-scene">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front"></div>
            <div class="card-face card-back">
                <div class="type-label" id="card-type">REVELA</div>
                <div class="content-text" id="card-text">Escolha um botão abaixo!</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-action verdade" onclick="pick('verdade')">REVELA</button>
        <button class="btn-action desafio" onclick="pick('desafio')">PAGA</button>
    </div>

    <div class="custom-area">
        <div class="input-group">
            <input type="text" id="custom-text" placeholder="Add segredo ou castigo...">
            <button class="add-btn" onclick="addCustom()">ADD</button>
        </div>
    </div>

<script>
    // --- CANVAS BACKGROUND ANIMATION ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.1,
                opacity: Math.random()
            });
        }
    }

    function animateBg() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles.forEach(p => {
            p.y -= p.speed;
            if(p.y < 0) p.y = canvas.height;
            ctx.fillStyle = `rgba(0, 242, 254, ${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animateBg);
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();
    animateBg();

    // --- SISTEMA DE ÁUDIO ---
    let audioCtx = null;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startAmbientLoop();
    }

    function startAmbientLoop() {
        const playNote = (freq, time, volume) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(volume, time + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 2);
        };
        setInterval(() => {
            let now = audioCtx.currentTime;
            playNote(261.63, now, 0.05);
            playNote(329.63, now + 1, 0.05);
            playNote(392.00, now + 2, 0.05);
            playNote(349.23, now + 3, 0.05);
        }, 4000);
    }

    // Som de Entrada no Loading (Novo)
    function playLoadingSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.5);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.5);
    }

    function playIconSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.2);
    }

    function playCategorySound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.1);
        osc.frequency.linearRampToValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    }

    function playCardSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    }

    function playRouletteSound() {
        if (!audioCtx) return;
        let playCount = 0;
        const interval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150 + (playCount * 5), audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            playCount++;
            if (playCount > 50) clearInterval(interval);
        }, 80);
    }

    // --- LÓGICA DO LOADING ---
    window.onload = () => {
        const fill = document.getElementById('fill');
        const btn = document.getElementById('enter-btn');
        const bgElements = document.getElementById('loading-bg-elements');
        
        // Criar partículas de loading
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.className = 'loading-particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 5 + 2) + 'px';
            p.style.animationDelay = Math.random() * 5 + 's';
            bgElements.appendChild(p);
        }

        setTimeout(() => { fill.style.width = "100%"; }, 100);
        setTimeout(() => { btn.style.display = "block"; }, 2600);
    };

    function startGame() {
        initAudio();
        playLoadingSound();
        document.getElementById('loading-screen').style.opacity = "0";
        setTimeout(() => { document.getElementById('loading-screen').style.display = "none"; }, 1000);
    }

    // --- LÓGICA DO JOGO ---
    let players = [];
    let isSpinning = false;

    function openRouletteWithSound() {
        playIconSound();
        toggleRoulette();
    }
    
    function toggleRoulette() {
        const modal = document.getElementById('roulette-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function addPlayer() {
        const input = document.getElementById('player-name');
        if (input.value.trim() !== "") {
            players.push(input.value.trim());
            renderPlayers();
            input.value = "";
        }
    }

    function renderPlayers() {
        document.getElementById('player-tags').innerHTML = players.map(p => `<span class="player-tag">${p}</span>`).join('');
    }

    function spinWheel() {
        if (players.length < 2 || isSpinning) return;
        isSpinning = true;
        playRouletteSound();
        const wheel = document.getElementById('wheel');
        const display = document.getElementById('winner-display');
        display.innerText = "SORTEANDO...";
        display.classList.remove('win-anim');
        const deg = Math.floor(Math.random() * 360) + 5000; 
        wheel.style.transform = `rotate(${deg}deg)`;
        setTimeout(() => {
            display.innerText = players[Math.floor(Math.random() * players.length)];
            display.classList.add('win-anim');
            isSpinning = false;
        }, 5000);
    }

    const card = document.getElementById('card');
    const scene = document.getElementById('card-scene');
    const cardText = document.getElementById('card-text');
    const cardType = document.getElementById('card-type');
    let currentCategory = 'Amigos';
    let usedQuestions = [];

    const db = {
        'Amigos': {
            verdade: [
                "Qual seu crush secreto hoje?", "Já mentiu para alguém nesta roda?", "Beijaria alguém aqui por 100 reais?", "Pior mico que passou?", "Ilha deserta com quem?", 
                "Quem aqui é a pessoa mais chata?", "Qual foi a última mentira que você contou?", "Já pegou algum ex de amigo?", "Qual seu hábito mais estranho?"
            ],
            desafio: [
                "Imite um macaco por 30 segundos.", "Mande um emoji de coração pro seu crush.", "Tente lamber seu cotovelo.", "Dança ridícula sem música.",
                "Fale com sotaque de outro estado até sua próxima vez."
            ]
        },
        'Pesado': {
            verdade: [
                "Qual sua maior fantasia?", "Já beijou alguém nesta roda?", "Mandou nudes recentemente?", "Já teve sonho erótico com alguém daqui?", "Qual seu ponto mais sensível?"
            ],
            desafio: [
                "Beijo no pescoço da pessoa à sua esquerda.", "Mande uma mensagem ousada pro último match do Tinder.", "Tire uma peça de roupa."
            ]
        },
        'Família': {
            verdade: [
                "Quem é o filho favorito?", "Qual segredo você esconde dos seus pais?", "Lembrança de infância mais engraçada?", "Já culpou seu irmão por um erro seu?"
            ],
            desafio: [
                "Lave a louça da próxima refeição.", "Conte uma piada ruim e faça todos rirem.", "Mímica de um animal difícil."
            ]
        }
    };

    function setCategory(cat) {
        if(currentCategory === cat) return;
        currentCategory = cat;
        playCategorySound();
        usedQuestions = [];
        scene.classList.remove('card-change-anim');
        void scene.offsetWidth; 
        scene.classList.add('card-change-anim');
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        document.getElementById('mode-info').innerText = "MODO: " + cat.toUpperCase();
        resetCard();
    }

    function pick(mode) {
        playCardSound();
        const list = db[currentCategory][mode === 'verdade' ? 'verdade' : 'desafio'];
        let available = list.filter(q => !usedQuestions.includes(q));
        if (available.length === 0) { usedQuestions = []; available = list; }
        const randomText = available[Math.floor(Math.random() * available.length)];
        usedQuestions.push(randomText);
        
        if(card.classList.contains('is-flipped')) {
            card.classList.remove('is-flipped');
            setTimeout(() => { updateAndFlip(mode, randomText); }, 300);
        } else { updateAndFlip(mode, randomText); }
    }

    function updateAndFlip(mode, text) {
        cardType.innerText = mode === 'verdade' ? 'REVELA' : 'PAGA';
        cardType.style.color = mode === 'verdade' ? '#2196F3' : '#F44336';
        cardText.innerText = text;
        card.classList.add('is-flipped');
    }

    function flipCard() { 
        if(cardText.innerText !== "Escolha um botão abaixo!") {
            playCardSound();
            card.classList.toggle('is-flipped');
        }
    }
    
    function resetCard() { card.classList.remove('is-flipped'); cardText.innerText = "Escolha um botão abaixo!"; }
    
    function addCustom() {
        const input = document.getElementById('custom-text');
        if(input.value.trim() !== "") db[currentCategory].desafio.push(input.value);
        input.value = "";
    }
</script>
</body>
</html>
