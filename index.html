<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Regional - Oficial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ff004c; --player-color: #00ff88; --bg-dark: #0f0f13; --card-bg: #1a1a24; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); font-family: sans-serif; color: white; overflow: hidden; }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .title span { color: var(--primary); }
        input { width: 100%; max-width: 350px; padding: 12px; background: var(--card-bg); border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .selection-group { width: 100%; max-width: 350px; margin: 15px 0; }
        .custom-radio { display: block; margin-bottom: 8px; cursor: pointer; }
        .radio-content { background: var(--card-bg); padding: 12px; border-radius: 8px; border: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        input[type="radio"]:checked + .radio-content { border-color: var(--primary); background: #251a20; }

        #start-btn { width: 100%; max-width: 350px; padding: 15px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        
        #map-screen { position: relative; width: 100%; height: 100vh; display: none; }
        #map-area { width: 100%; height: 100%; background: #111; }
        .map-ui { position: absolute; top: 0; width: 100%; padding: 10px; z-index: 1000; background: rgba(0,0,0,0.85); box-sizing: border-box; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #000; padding: 4px 8px; border-radius: 10px; font-size: 0.75rem; border: 1px solid #444; }
        .life-counter { color: #ff004c; font-weight: bold; font-size: 1.1rem; }
        #game-msg { color: gold; font-size: 0.85rem; margin-top: 5px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <h1 style="font-size: 1.8rem;">ZOMBIE <span>REGIONAL</span></h1>
        <div style="width: 100%; max-width: 350px; display: flex; flex-direction: column;">
            <input type="text" id="user-name" placeholder="Seu Nome">
            <input type="number" id="user-age" placeholder="Idade">
            <input type="text" id="city-input" placeholder="Sua Cidade">
        </div>

        <div class="selection-group">
            <label class="custom-radio">
                <input type="radio" name="game-mode" value="multi" checked style="display:none">
                <div class="radio-content">
                    <span>MODO ONLINE</span>
                    <small id="vagas-texto" style="color:var(--player-color)">Vagas: --</small>
                </div>
            </label>
            <label class="custom-radio">
                <input type="radio" name="game-mode" value="global" style="display:none">
                <div class="radio-content">
                    <span>MODO GLOBAL</span>
                    <small>Missão Coop</small>
                </div>
            </label>
        </div>

        <button id="start-btn" onclick="entrarNoJogo()">INICIAR BUSCA</button>
    </div>

    <div id="map-screen">
        <div class="map-ui">
            <div class="stats-header">
                <div class="life-counter" id="display-lives">❤️❤️❤️</div>
                <div class="badge" id="mode-badge">MULTIPLAYER</div>
                <button onclick="location.reload()" style="background:red; color:white; border:none; padding:4px 10px; border-radius:4px; font-size: 0.7rem;">SAIR</button>
            </div>
            <div id="game-msg">Aguardando GPS...</div>
        </div>
        <div id="map-area"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmKa73fkJYK-QeDFazZDFwFFzwoyH5Koo",
            authDomain: "zombie-regional.firebaseapp.com",
            databaseURL: "https://zombie-regional-default-rtdb.firebaseio.com",
            projectId: "zombie-regional",
            storageBucket: "zombie-regional.firebasestorage.app",
            messagingSenderId: "158751505883",
            appId: "1:158751505883:web:5b1d44f5f6b153d3063bfe"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        var idUser = "user_" + Math.floor(Math.random() * 999999);
        var mapa, meuMarcador, vidas = 3, modoEscolhido;
        var marcadoresOutros = {}, marcadoresZumbis = {}, marcadoresItens = {}, pontoEscapeObj = null;

        // LIMPEZA AUTOMÁTICA DE "FANTASMAS" E ATUALIZAÇÃO DE VAGAS
        db.ref('jogadores').on('value', snap => {
            let count = 0;
            snap.forEach(() => count++);
            const vagas = 3 - count;
            document.getElementById('vagas-texto').innerText = vagas <= 0 ? "LOTADO" : "Vagas: " + vagas;
            // Se as vagas bugarem (menos que zero), o admin pode resetar o banco
        });

        function entrarNoJogo() {
            const nome = document.getElementById('user-name').value;
            const cidade = document.getElementById('city-input').value;
            modoEscolhido = document.querySelector('input[name="game-mode"]:checked').value;

            if (!nome || !cidade) return alert("Preencha os campos!");
            
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('map-screen').style.display = 'block';
            document.getElementById('mode-badge').innerText = modoEscolhido.toUpperCase();

            iniciarJogo(nome, cidade);
        }

        function iniciarJogo(nome, cidade) {
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                const path = modoEscolhido === 'multi' ? 'jogadores/' : 'global/players/';
                const userRef = db.ref(path + idUser);

                // A MÁGICA: onDisconnect apaga seus dados se a conexão cair!
                userRef.onDisconnect().remove();
                userRef.set({ nome, lat, lng, vidas, timestamp: Date.now() });

                if (!mapa) {
                    mapa = L.map('map-area', { zoomControl: false }).setView([lat, lng], 17);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
                    meuMarcador = L.circleMarker([lat, lng], { radius: 10, fillColor: "#00ff88", color: "#fff", fillOpacity: 1 }).addTo(mapa);
                    
                    if(modoEscolhido === 'global') {
                        db.ref('global/missao').once('value', snap => {
                            if (!snap.exists()) gerarMundoGlobal(lat, lng);
                        });
                        ouvirGlobal();
                    } else {
                        document.getElementById('game-msg').innerText = "Modo Livre Ativado";
                        ouvirMultiplayer();
                    }
                } else {
                    meuMarcador.setLatLng([lat, lng]);
                    if(modoEscolhido === 'global') verificarColisaoGlobal(lat, lng);
                }
            }, null, { enableHighAccuracy: true });
        }

        function gerarMundoGlobal(lat, lng) {
            let itens = {};
            for(let i=0; i<3; i++) {
                itens['item_'+i] = { lat: lat + (Math.random()-0.5)*0.008, lng: lng + (Math.random()-0.5)*0.008 };
            }
            let zumbis = {};
            for(let i=0; i<12; i++) {
                zumbis['z_'+i] = { lat: lat + (Math.random()-0.5)*0.01, lng: lng + (Math.random()-0.5)*0.01 };
            }
            db.ref('global/missao').set({ itens, zumbis, moedasColetadas: 0 });
            // Limpa a missão se o último jogador sair
            db.ref('global/missao').onDisconnect().remove();
        }

        function ouvirMultiplayer() {
            db.ref('jogadores').on('value', snap => {
                const data = snap.val();
                // Limpa marcadores antigos para não duplicar
                for(let id in marcadoresOutros) mapa.removeLayer(marcadoresOutros[id]);
                marcadoresOutros = {};

                for(let id in data) {
                    if(id !== idUser) {
                        marcadoresOutros[id] = L.circleMarker([data[id].lat, data[id].lng], {radius: 8, fillColor: "red"}).addTo(mapa);
                        marcadoresOutros[id].bindTooltip(data[id].nome);
                    }
                }
            });
        }

        function ouvirGlobal() {
            db.ref('global/missao').on('value', snap => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('game-msg').innerText = `MOEDAS: ${data.moedasColetadas}/3`;

                for(let id in marcadoresItens) mapa.removeLayer(marcadoresItens[id]);
                marcadoresItens = {};
                for(let id in data.itens) marcadoresItens[id] = L.circleMarker([data.itens[id].lat, data.itens[id].lng], {radius: 7, fillColor: "gold"}).addTo(mapa);

                for(let id in marcadoresZumbis) mapa.removeLayer(marcadoresZumbis[id]);
                marcadoresZumbis = {};
                for(let id in data.zumbis) marcadoresZumbis[id] = L.circleMarker([data.zumbis[id].lat, data.zumbis[id].lng], {radius: 9, fillColor: "red"}).addTo(mapa);
            });
        }

        function verificarColisaoGlobal(lat, lng) {
            for(let id in marcadoresItens) {
                if(mapa.distance([lat, lng], marcadoresItens[id].getLatLng()) < 20) {
                    db.ref('global/missao/itens/' + id).remove();
                    db.ref('global/missao/moedasColetadas').transaction(c => (c || 0) + 1);
                }
            }
            for(let id in marcadoresZumbis) {
                if(mapa.distance([lat, lng], marcadoresZumbis[id].getLatLng()) < 15) {
                    vidas--;
                    db.ref('global/missao/zumbis/' + id).remove();
                    document.getElementById('display-lives').innerText = "❤️".repeat(vidas) || "💀";
                    if(vidas <= 0) { alert("VOCÊ MORREU!"); location.reload(); }
                }
            }
        }

        // Limpeza extra ao fechar normal
        window.onbeforeunload = () => {
            db.ref('jogadores/' + idUser).remove();
            db.ref('global/players/' + idUser).remove();
        };
    </script>
</body>
</html>
